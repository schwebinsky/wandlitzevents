<!-- In Squarespace in einen Code-Block einfügen und WIDGET-URL ersetzen. -->
<iframe
  id="wandlitz-events-widget"
  src="https://DEIN-PROJEKT.vercel.app/?limit=24"
  title="Veranstaltungen in Wandlitz"
  loading="lazy"
  style="width:100%;height:1200px;border:0;display:block;overflow:hidden"
></iframe>

<script>
  (() => {
    const frame = document.getElementById("wandlitz-events-widget");
    const allowedOrigin = new URL(frame.src).origin;

    window.addEventListener("message", (event) => {
      if (event.origin !== allowedOrigin) return;
      if (event.data?.type !== "wandlitz-events-height") return;

      const height = Math.max(400, Math.min(Number(event.data.height) || 1200, 8000));
      frame.style.height = `${height}px`;
    });
  })();
</script>
