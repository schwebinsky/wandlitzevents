<!-- In Squarespace in einen Code-Block einfügen und DEIN-PROJEKT ersetzen. -->
<iframe
  id="regional-events-widget"
  src="https://DEIN-PROJEKT.vercel.app/?limit=80"
  title="Veranstaltungen in Wandlitz und Bernau"
  loading="lazy"
  style="width:100%;height:1400px;border:0;display:block;overflow:hidden"
></iframe>

<script>
  (() => {
    const frame = document.getElementById("regional-events-widget");
    const allowedOrigin = new URL(frame.src).origin;

    window.addEventListener("message", (event) => {
      if (event.origin !== allowedOrigin) return;
      if (event.data?.type !== "wandlitz-events-height") return;

      const height = Math.max(360, Math.min(Number(event.data.height) || 1400, 8000));
      frame.style.height = `${height}px`;
    });
  })();
</script>
